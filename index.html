<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Narrator</title>
<style>
  :root {
    --ink: #0d0f0e;
    --paper: #f6f5f1;
    --signal: #ff6a3d;
    --muted: #8a897f;
    --line: #26281f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  #app { position: relative; width: 100vw; height: 100vh; }
  video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(13,15,14,0.75) 0%, rgba(13,15,14,0) 22%, rgba(13,15,14,0) 62%, rgba(13,15,14,0.9) 100%);
    pointer-events: none;
  }
  #top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(18px, env(safe-area-inset-top)) 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #status {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted);
  }
  #dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  #dot.live {
    background: var(--signal);
    box-shadow: 0 0 0 0 rgba(255,106,61,0.6);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,106,61,0.55); }
    70% { box-shadow: 0 0 0 10px rgba(255,106,61,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,106,61,0); }
  }
  #caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 22px max(28px, env(safe-area-inset-bottom));
  }
  #captionText {
    font-size: 21px; line-height: 1.35; font-weight: 500;
    max-width: 640px;
  }
  #captionText .fresh { color: var(--paper); }
  #log {
    font-size: 12px; color: var(--muted); margin-top: 10px;
    letter-spacing: 0.02em;
  }
  #controls {
    position: absolute; top: 0; bottom: 0; left: 0; right: 0;
    display: flex; align-items: flex-end; justify-content: center;
    pointer-events: none;
  }
  #bigButton {
    pointer-events: all;
    position: absolute;
    bottom: max(140px, calc(140px + env(safe-area-inset-bottom)));
    width: 74px; height: 74px; border-radius: 50%;
    border: 3px solid var(--paper);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  #bigButton.on { background: var(--signal); border-color: var(--signal); }
  #bigButton svg { width: 26px; height: 26px; }
  #startOverlay {
    position: absolute; inset: 0;
    background: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; padding: 40px; text-align: center; z-index: 10;
  }
  #startOverlay h1 {
    font-size: 26px; font-weight: 600; margin: 0;
    letter-spacing: -0.01em;
  }
  #startOverlay p { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 0; max-width: 320px; }
  #startBtn {
    background: var(--signal); color: var(--ink); border: none;
    font-size: 16px; font-weight: 600; padding: 16px 34px; border-radius: 100px;
    letter-spacing: 0.01em;
  }
  #errorBox {
    display: none;
    position: absolute; top: 70px; left: 20px; right: 20px;
    background: rgba(180,40,20,0.92); color: white;
    padding: 12px 16px; border-radius: 10px; font-size: 13px;
    z-index: 20;
  }
</style>
</head>
<body>
<div id="app">
  <div id="startOverlay">
    <h1>Narrator</h1>
    <p>Points your camera at the world and speaks what matters, as it changes. Hold your phone up, camera facing outward.</p>
    <button id="startBtn">Start camera</button>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <div id="scrim"></div>
  <div id="errorBox"></div>

  <div id="top">
    <div id="status"><div id="dot"></div><span id="statusText">Idle</span></div>
  </div>

  <div id="caption">
    <div id="captionText">—</div>
    <div id="log"></div>
  </div>

  <button id="bigButton" aria-label="Toggle narration">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--paper)">
      <polygon points="5 3 19 12 5 21 5 3"></polygon>
    </svg>
  </button>
</div>

<script>
const video = document.getElementById('video');
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
const bigButton = document.getElementById('bigButton');
const dot = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const captionText = document.getElementById('captionText');
const logEl = document.getElementById('log');
const errorBox = document.getElementById('errorBox');

let running = false;
let lastSpoken = "";
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');
let loopTimer = null;
let busy = false;

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
    video.srcObject = stream;
    startOverlay.style.display = 'none';
  } catch (err) {
    showError('Camera access failed: ' + err.message);
  }
}

startBtn.addEventListener('click', startCamera);

function captureFrame() {
  const w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) return null;
  const targetW = 512;
  const scale = targetW / w;
  canvas.width = targetW;
  canvas.height = h * scale;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.05;
  utter.pitch = 1.0;
  window.speechSynthesis.speak(utter);
}

async function describeFrame(base64Image, previousDescription) {
  const systemPrompt = `You are the perception layer for a wearable narrator device used by someone who cannot see, or who has their eyes free for something else. You will be shown a photo taken from a chest or head-mounted camera, roughly once every few seconds.

Your job is NOT to describe everything in the frame. Your job is to decide what, if anything, is worth saying out loud right now, the way a sighted guide would speak to someone walking beside them.

Rules:
1. Prioritize in this order: (a) immediate hazards or obstacles in the path, (b) people approaching or nearby, (c) meaningful changes since the last update, (d) useful static context only if nothing else is happening.
2. Keep it to ONE short spoken sentence, under 12 words. Speak like a calm human guide, not a report. E.g. "Doorway ahead on your left." "Person walking toward you." "Table right in front of you."
3. If nothing new or important has happened since the previous description, respond with exactly: SKIP
4. Never describe colors, aesthetics, or unimportant background detail.
5. Never say "I see" or "the image shows" — speak directly, as if narrating the scene live.

Previous description given to the user: "${previousDescription || 'none yet'}"`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 60,
      system: systemPrompt,
      messages: [
        {
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Image } },
            { type: "text", text: "What, if anything, should be said right now?" }
          ]
        }
      ]
    })
  });

  const data = await response.json();
  const textBlock = (data.content || []).find(b => b.type === 'text');
  return textBlock ? textBlock.text.trim() : "SKIP";
}

async function tick() {
  if (!running || busy) return;
  const frame = captureFrame();
  if (!frame) return;
  busy = true;
  statusText.textContent = 'Watching…';
  try {
    const result = await describeFrame(frame, lastSpoken);
    if (result && result !== "SKIP" && result.toUpperCase() !== "SKIP") {
      captionText.innerHTML = '<span class="fresh">' + result + '</span>';
      logEl.textContent = 'spoken just now';
      speak(result);
      lastSpoken = result;
    } else {
      logEl.textContent = 'quiet — nothing new';
    }
  } catch (err) {
    showError('Description failed: ' + err.message);
  } finally {
    busy = false;
    statusText.textContent = running ? 'Live' : 'Idle';
  }
}

function setRunning(state) {
  running = state;
  dot.classList.toggle('live', running);
  statusText.textContent = running ? 'Live' : 'Idle';
  bigButton.classList.toggle('on', running);
  if (running) {
    tick();
    loopTimer = setInterval(tick, 4000);
  } else {
    clearInterval(loopTimer);
    window.speechSynthesis.cancel();
  }
}

bigButton.addEventListener('click', () => {
  if (!video.srcObject) {
    showError('Start the camera first.');
    return;
  }
  setRunning(!running);
});
</script>
</body>
</html>
